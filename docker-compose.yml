version: '3.8'

services:
  app:
    build: .
    container_name: biometric-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./certs:/app/certs:ro
    environment:
      - STREAMLIT_SERVER_SSL_CERT_FILE=/app/certs/cert.pem
      - STREAMLIT_SERVER_SSL_KEY_FILE=/app/certs/key.pem
    restart: unless-stopped