image: python:3.11

stages:
  - test
  - deploy

variables:
  PIP_NO_CACHE_DIR: "off"

cache:
  paths:
    - .pip-cache/

test:
  stage: test
  script:
    - pip config set global.index-url http://gitlab.local/api/v4/projects/1/packages/pypi/simple
    - pip config set global.trusted-host gitlab.local
    - pip install --upgrade pip
    - pip install biometric-face-preprocessor
    - pip install -r requirements.txt
    - |
      python -c '
      from biometric_face_preprocessor.pipeline_models.biometric_pipeline import BiometricPreprocessorPipeline
      from biometric_face_preprocessor.pipeline_models.mediapipe_face_detector import MediaPipeFaceDetector
      print("✅ biometric-face-preprocessor imported successfully")
      print("✅ Pipeline and MediaPipeFaceDetector available")
      '
    - echo "✅ Demo app ready (installation + imports verified)"
  cache:
    paths:
      - .pip-cache/

deploy:
  stage: deploy
  script:
    - echo "Deploy not implemented yet"
  when: manual