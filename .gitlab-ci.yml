stages:
  - build
  - deploy

build:
  stage: build
  tags:
    - host
  script:
    - docker compose build
  cache:
    paths:
      - /var/lib/docker/

deploy:
  stage: deploy
  tags:
    - host
  script:
    - docker compose down --remove-orphans || true
    - docker compose up -d --force-recreate