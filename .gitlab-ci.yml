image: python:3.11

stages:
  - test
  - build

variables:
  GITLAB_REGISTRY_TOKEN: $CI_JOB_TOKEN   # автоматически доступен в CI

test:
  stage: test
  script:
    # Устанавливаем приватный пакет из Package Registry (Project ID=1)
    - pip install --upgrade pip
    - pip install --extra-index-url "https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/api/v4/projects/1/packages/pypi/simple/" -r requirements.txt
    - echo "✅ Все пакеты установлены, включая biometric-face-preprocessor"
    - python -c "from biometric_face_preprocessor.pipeline_models.biometric_pipeline import BiometricPreprocessorPipeline; print('✅ Pipeline импортируется')"

build:
  stage: build
  script:
    - docker compose build --build-arg GITLAB_REGISTRY_TOKEN=${CI_JOB_TOKEN}
  when: manual
  tags:
    - docker