stages:
  - build
  - deploy

# ==================== BUILD STAGE ====================
build:
  stage: build
  image: docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  tags:
    - docker
  script:
    - apk add --no-cache docker-compose
    # Полная пересборка без кэша — решает проблему со старым app.py
    - docker build --no-cache --pull \
      --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
      --add-host=gitlab.local:host-gateway \
      -t biometric-demo:latest .
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ==================== DEPLOY STAGE ====================
deploy:
  stage: deploy
  image: docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  tags:
    - docker
  script:
    - apk add --no-cache docker-compose
    # Полная пересборка без кэша
    - docker build --no-cache --pull \
      --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
      --add-host=gitlab.local:host-gateway \
      -t biometric-demo:latest .

    # Очистка старых контейнеров
    - docker compose down --remove-orphans || true

    # Дополнительная очистка Docker builder cache (очень помогает)
    - docker builder prune -f --all || true

    # Запуск с force recreate
    - docker compose up -d --force-recreate --pull
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"