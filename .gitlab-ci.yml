stages:
  - build
  - deploy

build:
  stage: build
  image: docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  tags:
    - docker
  script:
    - apk add --no-cache docker-compose
    - docker build --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN --add-host=gitlab.local:host-gateway -t biometric-demo .
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

deploy:
  stage: deploy
  image: docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  tags:
    - docker
  script:
    - apk add --no-cache docker-compose
    - docker build --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN --add-host=gitlab.local:host-gateway -t biometric-demo .
    - docker compose down --remove-orphans || true
    - docker compose up -d --force-recreate
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"