stages:
  - build
  - deploy

# ==================== BUILD (только сборка) ====================
build:
  stage: build
  image: docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  tags:
    - docker
  script:
    - apk add --no-cache docker-compose
    # Используем block scalar | — надёжно передаёт многострочную команду buildx
    - |
      docker build \
        --no-cache \
        --pull \
        --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
        --add-host=gitlab.local:host-gateway \
        -t biometric-demo:latest .
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# ==================== DEPLOY (чистая пересборка + запуск) ====================
deploy:
  stage: deploy
  image: docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  tags:
    - docker
  script:
    - apk add --no-cache docker-compose
    # Тот же block scalar для deploy
    - |
      docker build \
        --no-cache \
        --pull \
        --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
        --add-host=gitlab.local:host-gateway \
        -t biometric-demo:latest .

    # Полная очистка старого
    - docker compose down --remove-orphans || true
    - docker builder prune -f --all || true
    - docker system prune -f --all || true

    # Запуск
    - docker compose up -d --force-recreate --pull
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"