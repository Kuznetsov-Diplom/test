stages:
  - deploy

# ==================== DEPLOY (единственная стадия — максимально быстро) ====================
deploy:
  stage: deploy
  image: docker:24-cli
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  tags:
    - docker
  script:
    - apk add --no-cache docker-compose

    # Полная чистая пересборка (гарантирует свежий app.py)
    - |
      docker build \
        --no-cache \
        --pull \
        --build-arg CI_JOB_TOKEN=$CI_JOB_TOKEN \
        --add-host=gitlab.local:host-gateway \
        -t biometric-demo:latest .

    # Запуск БЕЗ --pull always (образ уже собран локально)
    - docker compose up -d --force-recreate

  rules:
    - if: $CI_PIPELINE_SOURCE == "push"