image: docker:24.0
services:
  - docker:24.0-dind

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_DRIVER: overlay2

stages:
  - build
  - deploy

build:
  stage: build
  tags:
    - host
  script:
    - docker build -t biometric-face-preprocessor-demo:latest .
  cache:
    paths:
      - /var/lib/docker/

deploy:
  stage: deploy
  tags:
    - host
  script:
    - docker-compose down --remove-orphans || true
    - docker-compose up -d --build --force-recreate
  when: manual