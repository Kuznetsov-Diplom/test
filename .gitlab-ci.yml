stages:
  - build
  - deploy

build:
  stage: build
  tags:
    - host
  script:
    - docker build --add-host=gitlab.local:host-gateway -t biometric-face-preprocessor-demo:latest .
  cache:
    paths:
      - /var/lib/docker/   # опционально, ускоряет повторные сборки

deploy:
  stage: deploy
  tags:
    - host
  script:
    - docker-compose down --remove-orphans || true
    - docker-compose up -d --build --force-recreate
  when: manual